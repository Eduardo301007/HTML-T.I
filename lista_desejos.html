<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de desejos</title>
    <style>
        .itens {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.425);
            padding: 10px;
        }
        button {
            padding: 15px 50px;
            background-color: black;
            border: none;
            border-radius: 10px;
            color: white;
            transition: 0.5s;
        }
        button:hover {
            background-color: rgb(255, 0, 0);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <p>Todos os itens:</p>
    <div id="lista">
        <div class="itens">
            <input type="checkbox" class="checks"/>
            <div class="itens_dentro">
                <p class="nome">Nome:</p>
                <p class="preco">Preço:</p>
            </div>      
        </div>
    </div>
    <button id="remover">Remover selecionados</button>

    <script>
        const lista = document.getElementById('lista');

        // Adiciona evento aos checkboxes existentes e futuros
        lista.addEventListener('click', (e) => {
            if (e.target.classList.contains('checks') && e.target.checked) {
                // Cria novo item
                const divItens = document.createElement('div');
                divItens.className = 'itens';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'checks';

                const divDentro = document.createElement('div');
                divDentro.className = 'itens_dentro';

                const pNome = document.createElement('p');
                pNome.className = 'nome';
                pNome.textContent = 'Nome:';

                const pPreco = document.createElement('p');
                pPreco.className = 'preco';
                pPreco.textContent = 'Preço:';

                divDentro.appendChild(pNome);
                divDentro.appendChild(pPreco);
                divItens.appendChild(checkbox);
                divItens.appendChild(divDentro);

                lista.appendChild(divItens);
            }
        });

        // Botão para remover itens selecionados
        document.getElementById('remover').addEventListener('click', () => {
            const selecionados = document.querySelectorAll('.checks:checked');
            selecionados.forEach(chk => chk.closest('.itens').remove());
        });
    </script>
</body>
</html>
