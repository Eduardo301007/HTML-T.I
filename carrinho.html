<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>

    <style>
    
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Momo+Trust+Display&display=swap');
    

    body{
        font-family: "Momo Trust Display", sans-serif;
        font-weight: 400;
        font-style: normal;
    }
    div
        {
            display: flex;
            justify-content: center;
            position: relative;
            float: right;
            background-color: rgb(218, 218, 218);        
            width: 40vw;
            height: 100vh;
            box-shadow: 5px 5px 15px rgb(140, 140, 140);
        }

        p
        {
            position: absolute;
            bottom: 20vh;
            right: 30vw;
        }


        #btn_comprar{
            position: absolute;
            bottom: 10vh;  
            text-align: center;
            font-size: large;
            height: 40px;
            width: 30vw;
            border: none;
            border-radius: 100px;
            transition: 0.7s;
        }
        #btn_comprar:hover{
            background-color: rgb(255, 76, 76);
            transform: scale(1.02);
        }

        #btn_voltar
        {
            position: absolute;
            top: 2px;  
            left: 2px;
            text-align: center;
            font-size: 1.5rem;
            width: 100px;
            border: none;
            border-radius: 3px;
            transition: 0.5s;
            background-color: black;
            color: white;
        }

        #btn_voltar:hover
        {
            background-color: rgb(255, 76, 76);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="div_geral">
        <button id="btn_comprar">Comprar</button>
        <p>Preço Final: </p>
    </div>

    <a href="index.html"><button id="btn_voltar">⬅</button></a>
</body>
</html>
