<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Loja</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Momo+Trust+Display&display=swap');


    body, h1, h2, p
    {
        font-family: "Momo Trust Display", sans-serif;
        font-weight: 400;
        font-style: normal;
        margin: 0;
        padding: 0;           
    }

    h1
    {
        margin-right: auto;
        font-size: 3rem;
        color: rgb(0, 255, 162);
        right: auto;
    }

    nav{
        display: flex;
        justify-content: right;
        align-items: center;
        gap: 30px;   
        padding: 20px 20px;
        background-color: black;
        
    }

    nav a{    
        text-decoration: none;
        color: white; 
        font-size: 1.3rem;
        transition: 0.5s;
    }

    nav a:hover
    {
        color: yellow;
    }

    #procurar{
        display: flex;
        justify-content: center;
        width: 450px;
        height: 35px;
        border: none;
        border-radius: 3px;
    }

    #procurar:placeholder-shown{
        font-size: 1.3rem;
    }

    header, footer
    {
        display: flex;
        justify-content: center;
        font-family: "Playfair Display", serif;
        align-items: center;
        padding: 20px;
    }


    button
    {
        margin-top: 40px;
        padding: 12px 50px;
        border: none;
        border-radius: 10px;
        transition: 0.5s;
        font-size: 1.5rem;
        font-family: "Playfair Display", serif;
        background-color: black;
        color: white;
        cursor: pointer;
    }

    button:hover
    {
        background-color: rgb(255, 79, 79);
    }
    .geral
    {
        display: flex;          
        flex-wrap: wrap;        
        justify-content: center;
        gap: 40px;  
    }

    .itens
    {
        display: flex;
        flex-direction: column;
        justify-content: space-between;    
        background-color: rgb(255, 255, 255);
        width: 350px;
        height: 450px;   
        padding: 10px;
        border-radius: 10px;
        box-shadow: 5px 5px 15px  gray;
        transition: 0.6s;
    }

    .itens:hover{
        transform: scale(1.05);
    }

    .btn_adicionar_carrinho
    {
        margin-top: auto;
    }
</style>

</head>
<body>
    <nav>
        <h1>Zentro</h1>
        <input type="text" id="procurar" placeholder="Procurar">
        <a href="lista_desejos.html">Lista de desejos❤️</a>
        <a href="mailto:edu.ferreira3010@gmail.com">Contato</a>
        <a href="carrinho.html">Carrinho</a>
        <a href="usuario.html">Usuário</a>

    </nav>
    <header>
        
    </header>

    <main>
        <div class="geral">
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
            <div class="itens" style="margin-bottom: 100px;"><button class="btn_adicionar_carrinho">Adicionar ao carrinho</button></div>
        </div>
        
    </main>

    <script>

    document.addEventListener('DOMContentLoaded', () =>
    {
        const btns = document.querySelectorAll(".btn_adicionar_carrinho");

        btns.forEach((btn) => {
        btn.addEventListener("click", () => {
            alert("Produto adicionado ao carrinho!");
        });
        });
        
    });     
    </script>
</body>
</html>
